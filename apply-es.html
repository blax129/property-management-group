<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=apply.html?lang=es">
  <title>Redirecting…</title>
  <script>
    (function () {
      var url = new URL('apply.html', location.href);
      url.searchParams.set('lang', 'es');
      location.replace(url.href);
    })();
  </script>
</head>
<body>
  <p><a href="apply.html?lang=es">Continue to application</a></p>
</body>
</html>
