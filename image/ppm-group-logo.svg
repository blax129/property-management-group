<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Property Management Group">
  <defs>
    <linearGradient id="ppm-bg" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e4d8c"/>
      <stop offset="0.5" stop-color="#0f2744"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="ppm-gold" x1="32" y1="10" x2="32" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0e2c0"/>
      <stop offset="0.5" stop-color="#c9a962"/>
      <stop offset="1" stop-color="#7a6235"/>
    </linearGradient>
    <linearGradient id="ppm-mark" x1="32" y1="24" x2="32" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c8d4e4"/>
    </linearGradient>
    <filter id="ppm-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#ppm-bg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="13.5" fill="none" stroke="#c9a962" stroke-opacity="0.18" stroke-width="0.8"/>

  <!-- Roof crown -->
  <path d="M32 11 48 24.5H16Z" fill="url(#ppm-gold)" filter="url(#ppm-glow)"/>
  <path d="M32 11 48 24.5H16Z" fill="none" stroke="#fff8ea" stroke-opacity="0.25" stroke-width="0.35" stroke-linejoin="round"/>

  <!-- Building facade columns -->
  <g fill="url(#ppm-mark)" filter="url(#ppm-glow)">
    <rect x="17" y="27" width="4.2" height="16.5" rx="0.6"/>
    <rect x="25.9" y="27" width="4.2" height="16.5" rx="0.6"/>
    <rect x="34.8" y="27" width="4.2" height="16.5" rx="0.6"/>
    <rect x="42.8" y="27" width="4.2" height="16.5" rx="0.6"/>
    <path d="M15.5 27h33v2.8H15.5z" opacity="0.92"/>
    <path d="M15.5 43.5h33v2.2H15.5z" opacity="0.85"/>
  </g>

  <!-- Center monogram -->
  <text
    x="32"
    y="40.8"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="10.8"
    font-weight="700"
    fill="#07111f"
    stroke="#ffffff"
    stroke-width="0.55"
    paint-order="stroke fill"
    letter-spacing="0.2"
    filter="url(#ppm-glow)"
  >PPM</text>

  <path d="M18 48.5h28" stroke="url(#ppm-gold)" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
</svg>
