[build]
  publish = "."

[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://property-management.group/*"
  to = "https://privatepropmgt.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.property-management.group/*"
  to = "https://privatepropmgt.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/image/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
