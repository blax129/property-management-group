<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Payment verification received for Property Management Group private rental application review.">
  <title>Verification Received | Property Management Group</title>
  <link rel="icon" href="image/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="image/logo.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="image/apple-touch-icon.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Property Management Group">
  <meta property="og:title" content="Verification Received | Property Management Group">
  <meta property="og:description" content="Payment verification received for Property Management Group private rental application review.">
  <meta property="og:image" content="https://property-management.group/image/og-share.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Verification Received | Property Management Group">
  <meta name="twitter:description" content="Payment verification received for Property Management Group private rental application review.">
  <meta name="twitter:image" content="https://property-management.group/image/og-share.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="simple-flow-page">
  <header class="site-header back-nav">
    <div class="container header-inner">
      <a href="index.html" class="back-button" id="thankyouBackButton" aria-label="Back to home">
        <span class="back-button-icon" aria-hidden="true">←</span>
        <span>Back</span>
      </a>
    </div>
  </header>

  <main class="payment-confirmation-section">
    <div class="container narrow">
      <div class="success-message">
        <div class="success-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 4 12 14.01 7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Verification Received</h1>
        <p>Your confirmation has been received and is currently under review. It will be matched with your Application ID, and you will be contacted if any additional information is needed.</p>
        <div class="submit-section">
          <a class="button button-primary submit-button" id="returnHomeLink" href="index.html">Return Home</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const language = (params.get('lang') ||
        window.sessionStorage.getItem('latestApplicationLanguage') ||
        window.localStorage.getItem('latestApplicationLanguage') ||
        window.localStorage.getItem('site-language') ||
        document.documentElement.lang ||
        'en').toLowerCase().split('-')[0];
      const supportedLanguage = ['en', 'es', 'zh', 'fr', 'ar'].includes(language) ? language : 'en';
      const returnHomeLink = document.getElementById('returnHomeLink');
      const homeTargets = {
        en: 'index.html',
        es: 'index.html?lang=es',
        zh: 'index.html?lang=zh',
        fr: 'index.html?lang=fr',
        ar: 'index.html?lang=ar'
      };

      window.sessionStorage.setItem('latestApplicationLanguage', supportedLanguage);
      window.localStorage.setItem('latestApplicationLanguage', supportedLanguage);
      window.localStorage.setItem('site-language', supportedLanguage);

      const homeHref = homeTargets[supportedLanguage] || homeTargets.en;
      if (returnHomeLink) {
        returnHomeLink.href = homeHref;
      }
      const thankyouBackButton = document.getElementById('thankyouBackButton');
      if (thankyouBackButton) {
        thankyouBackButton.href = homeHref;
      }

      function loadEmailJsSdk() {
        return new Promise((resolve, reject) => {
          if (window.emailjs) {
            resolve(window.emailjs);
            return;
          }

          const existingScript = document.querySelector('script[src*="@emailjs/browser"]');
          if (existingScript) {
            existingScript.addEventListener('load', () => resolve(window.emailjs), { once: true });
            existingScript.addEventListener('error', reject, { once: true });
            return;
          }

          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
          script.async = true;
          script.onload = () => resolve(window.emailjs);
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      async function sendPendingPaymentUploadNotification() {
        const pendingNotification = window.sessionStorage.getItem('pendingPaymentUploadNotification');
        if (!pendingNotification) {
          return;
        }

        let payload;
        try {
          payload = JSON.parse(pendingNotification);
        } catch (error) {
          console.error('Payment screenshot EmailJS notification payload error:', error);
          window.sessionStorage.removeItem('pendingPaymentUploadNotification');
          return;
        }

        try {
          const emailjs = await loadEmailJsSdk();
          emailjs.init({ publicKey: '5DMw1roXD7XmNjRqk' });

          const emailResult = await emailjs.send('service_mjphomm', 'template_7fluizl', {
            to_email: 'daven5568@gmail.com',
            recipient_email: 'daven5568@gmail.com',
            subject: 'New Payment Screenshot Uploaded',
            cloudinary_url: payload.cloudinaryUrl,
            image_url: payload.cloudinaryUrl,
            payment_screenshot_url: payload.cloudinaryUrl,
            upload_timestamp: payload.uploadTimestamp,
            current_language: payload.currentLanguage || supportedLanguage,
            language: payload.currentLanguage || supportedLanguage,
            application_id: payload.applicationId || 'Not provided',
            public_id: payload.publicId || 'Not provided',
            message: [
              'New Payment Screenshot Uploaded',
              `Cloudinary image URL: ${payload.cloudinaryUrl}`,
              `Upload timestamp: ${payload.uploadTimestamp}`,
              `Current language: ${payload.currentLanguage || supportedLanguage}`,
              `Application ID: ${payload.applicationId || 'Not provided'}`
            ].join('\n')
          });

          console.log('Payment screenshot EmailJS notification sent successfully:', emailResult);
          window.sessionStorage.removeItem('pendingPaymentUploadNotification');
        } catch (error) {
          console.error('Payment screenshot EmailJS notification failed:', error);
        }
      }

      sendPendingPaymentUploadNotification();
    })();
  </script>
  <script src="i18n-extensions.js"></script>
  <script src="i18n-apply-form.js"></script>
  <script src="script.js"></script>
</body>
</html>
