<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=application-received.html?lang=es">
  <title>Redirecting…</title>
  <link rel="icon" href="image/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="image/logo.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="image/apple-touch-icon.png">
  <meta property="og:image" content="https://property-management.group/image/og-share.png">
  <script>
    (function () {
      var q = location.search ? location.search + '&lang=es' : '?lang=es';
      if (location.search && /[?&]lang=/.test(location.search)) {
        q = location.search;
      }
      location.replace('application-received.html' + q);
    })();
  </script>
</head>
<body>
  <p><a href="application-received.html?lang=es">Continue</a></p>
</body>
</html>
