<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=application-received.html?lang=es">
  <title>Redirecting…</title>
  <script>
    (function () {
      var q = location.search ? location.search + '&lang=es' : '?lang=es';
      if (location.search && /[?&]lang=/.test(location.search)) {
        q = location.search;
      }
      location.replace('application-received.html' + q);
    })();
  </script>
</head>
<body>
  <p><a href="application-received.html?lang=es">Continue</a></p>
</body>
</html>
